name: Deploy to Alibaba Cloud

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  SERVER_HOST: 47.106.102.208
  SERVER_USER: root
  DEPLOY_PATH: /opt/pricer3d

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -euo pipefail

            # Clone or pull latest code
            if [ -d "${{ env.DEPLOY_PATH }}" ]; then
              cd ${{ env.DEPLOY_PATH }}
              git pull origin master
            else
              git clone https://github.com/xiayuku63/pricer3d.git ${{ env.DEPLOY_PATH }}
              cd ${{ env.DEPLOY_PATH }}
            fi

            # Ensure .env.prod exists
            if [ ! -f .env.prod ]; then
              cp .env.prod.example .env.prod
              JWT_SECRET=$(openssl rand -hex 32)
              WEBHOOK_SECRET=$(openssl rand -hex 32)
              sed -i "s/JWT_SECRET_KEY=.*/JWT_SECRET_KEY=$JWT_SECRET/" .env.prod
              sed -i "s/PAYMENT_WEBHOOK_SECRET=.*/PAYMENT_WEBHOOK_SECRET=$WEBHOOK_SECRET/" .env.prod
              echo "✅ .env.prod created with auto-generated secrets"
            fi

            # Build and restart Docker container
            docker compose -f docker-compose.prod.yml down || true
            docker compose -f docker-compose.prod.yml up -d --build

            # Wait for health check
            echo "⏳ Waiting for app to be ready..."
            for i in $(seq 1 12); do
              sleep 5
              if curl -sf http://127.0.0.1:5000/healthz > /dev/null 2>&1; then
                echo "✅ Health check passed"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "❌ Health check failed"
                docker compose -f docker-compose.prod.yml logs --tail=30 app
                exit 1
              fi
            done

            # Verify PrusaSlicer
            echo "🔬 Verifying PrusaSlicer..."
            PRUSA_DIAG=$(docker exec pricer3d-app /app/venv/bin/python -c "
            import json
            from parser.prusa_slicer import prusa_executable_diagnostics
            d = prusa_executable_diagnostics()
            print(json.dumps({'found': d['found'], 'path': d['path']}))
            " 2>/dev/null || echo '{"found":false}')
            echo "  PrusaSlicer: $PRUSA_DIAG"

            echo "✅ Deployment successful!"
