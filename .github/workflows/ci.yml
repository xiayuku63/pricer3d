name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─────────────────────────────────────────────
  # CI: Lint
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"
      - uses: astral-sh/ruff-action@v3
        name: Ruff Format Check
        with:
          args: "format --check"

  # ─────────────────────────────────────────────
  # CI: Type Check
  # ─────────────────────────────────────────────
  typecheck:
    name: 🧬 Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install mypy pydantic
      - run: mypy app/ calculator/ parser/ --ignore-missing-imports --check-untyped-defs || echo "mypy warnings (non-blocking)"

  # ─────────────────────────────────────────────
  # CI: Test
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - name: Run tests
        env:
          DB_PATH: ":memory:"
        run: python -m pytest tests/ -v --tb=short --junitxml=report.xml
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: report.xml

  # ─────────────────────────────────────────────
  # CI: Docker Build
  # ─────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (production)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: false
          tags: pricer3d:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # CD: Deploy to Production
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    # Only deploy on push to main (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://47.106.102.208
    steps:
      - uses: actions/checkout@v4

      # appleboy/ssh-action uses Go SSH library which respects
      # GODEBUG to force IPv4 connections (avoiding timeout issues)
      - name: Deploy via SSH (IPv4 forced)
        env:
          GODEBUG: netdns=go+netgo
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}  # 47.106.102.208
          username: ${{ secrets.DEPLOY_USER }}  # xiayuku63
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          timeout: 600s
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /home/${{ secrets.DEPLOY_USER }}/pricer3d

            echo "📦 Pulling latest code..."
            git pull origin main

            echo "📝 Ensuring .env.prod exists..."
            if [ ! -f .env.prod ]; then
              cp .env.prod.example .env.prod
              JWT_SECRET=$(openssl rand -hex 32)
              WEBHOOK_SECRET=$(openssl rand -hex 32)
              sed -i "s/JWT_SECRET_KEY=.*/JWT_SECRET_KEY=$JWT_SECRET/" .env.prod
              sed -i "s/PAYMENT_WEBHOOK_SECRET=.*/PAYMENT_WEBHOOK_SECRET=$WEBHOOK_SECRET/" .env.prod
              echo "  ✅ .env.prod created with auto-generated secrets"
              echo "  ⚠️  Edit .env.prod to configure SMTP if needed"
            fi

            echo "🐳 Building Docker image..."
            docker compose -f docker-compose.prod.yml build

            echo "🔄 Restarting services..."
            docker compose -f docker-compose.prod.yml up -d

            echo "⏳ Waiting for services to start..."
            for i in $(seq 1 12); do
              sleep 5
              if curl -sf http://127.0.0.1:5000/healthz > /dev/null 2>&1; then
                echo "✅ Health check passed"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "⚠️  Health check failed after 60s"
                docker compose -f docker-compose.prod.yml logs --tail=30 app
                exit 1
              fi
            done

            echo "🔬 Verifying PrusaSlicer inside container..."
            PRUSA_DIAG=$(docker exec pricer3d-app /app/venv/bin/python -c "
            import json
            from parser.prusa_slicer import prusa_executable_diagnostics
            d = prusa_executable_diagnostics()
            print(json.dumps({'found': d['found'], 'path': d['path']}))
            " 2>/dev/null || echo '{"found":false}')
            echo "  PrusaSlicer: $PRUSA_DIAG"
