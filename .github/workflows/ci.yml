name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─────────────────────────────────────────────
  # CI: Lint
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"
      - uses: astral-sh/ruff-action@v3
        name: Ruff Format Check
        with:
          args: "format --check"

  # ─────────────────────────────────────────────
  # CI: Type Check
  # ─────────────────────────────────────────────
  typecheck:
    name: 🧬 Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install mypy pydantic
      - run: mypy app/ calculator/ parser/ --ignore-missing-imports --check-untyped-defs || echo "mypy warnings (non-blocking)"

  # ─────────────────────────────────────────────
  # CI: Test
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - name: Run tests
        env:
          DB_PATH: ":memory:"
        run: python -m pytest tests/ -v --tb=short --junitxml=report.xml
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: report.xml

  # ─────────────────────────────────────────────
  # CI: Docker Build
  # ─────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (production)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: false
          tags: pricer3d:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # CD: Deploy to Production
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    # Only deploy on push to main (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://47.106.102.208
    steps:
      - uses: actions/checkout@v4

      # appleboy/ssh-action uses Go SSH library which respects
      # GODEBUG to force IPv4 connections (avoiding timeout issues)
      - name: Deploy via SSH (IPv4 forced)
        env:
          GODEBUG: netdns=go+netgo
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}  # 47.106.102.208
          username: ${{ secrets.DEPLOY_USER }}  # xiayuku63
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /home/${{ secrets.DEPLOY_USER }}/pricer3d

            echo "📦 Pulling latest code..."
            git pull origin main

            echo "🐳 Building Docker image..."
            docker compose -f docker-compose.prod.yml build --no-cache

            echo "🔄 Restarting services..."
            docker compose -f docker-compose.prod.yml up -d

            echo "⏳ Waiting for services to start..."
            sleep 10

            echo "🏥 Health check..."
            if curl -sf http://127.0.0.1:5000/healthz > /dev/null 2>&1; then
              echo "✅ Deploy successful! Health check passed."
            else
              echo "⚠️  Health check failed, checking logs..."
              docker compose -f docker-compose.prod.yml logs --tail=50 app
              exit 1
            fi
