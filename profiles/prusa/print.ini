; PrusaSlicer default print config for 3D Printing Quoting System
; Bambu Lab A1 0.4mm nozzle — matched to factory 0.20mm Standard profile

; ── Print ──
layer_height = 0.2
first_layer_height = 0.35
fill_density = 20%
fill_pattern = grid
perimeters = 3
top_shell_layers = 5
bottom_shell_layers = 5
skirt_loops = 1
brim_width = 0
support_material = 0

; ── Speed (A1 0.20mm Standard process) ──
perimeter_speed = 250
external_perimeter_speed = 200
infill_speed = 270
solid_infill_speed = 250
top_solid_infill_speed = 250
gap_fill_speed = 250
bridge_speed = 100
travel_speed = 700
first_layer_speed = 50

; ── Acceleration (A1 process: 6000 default) ──
default_acceleration = 6000
perimeter_acceleration = 6000
infill_acceleration = 12000
external_perimeter_acceleration = 5000
bridge_acceleration = 5000
first_layer_acceleration = 3000
travel_acceleration = 12000

; ── Machine max limits (A1 0.4mm nozzle) ──
machine_max_acceleration_x = 12000
machine_max_acceleration_y = 12000
machine_max_acceleration_z = 1500
machine_max_acceleration_e = 5000
machine_max_acceleration_extruding = 12000
machine_max_acceleration_travel = 9000
machine_max_feedrate_x = 500
machine_max_feedrate_y = 500
machine_max_feedrate_z = 30
machine_max_feedrate_e = 30

; ── Jerk (A1: X/Y=9, Z=3, E=3) ──
machine_max_jerk_x = 9
machine_max_jerk_y = 9
machine_max_jerk_z = 3
machine_max_jerk_e = 3

; ── Retraction (A1 Direct Drive) ──
retract_length = 0.8
retract_speed = 30
deretract_speed = 30
retract_before_travel = 2
retract_lift = 0.4
retract_lift_below = 249

; ── No volumetric limit (A1 hotend: 92mm³ melt volume) ──
max_volumetric_speed = 0

; ── Filament (Bambu PLA Basic) ──
filament_diameter = 1.75
filament_density = 1.24
extrusion_multiplier = 0.98
temperature = 220
first_layer_temperature = 220
bed_temperature = 55
first_layer_bed_temperature = 55

; ── Cooling (PLA) ──
cooling = 1
fan_always_on = 1
max_fan_speed = 100
min_fan_speed = 35
bridge_fan_speed = 100
disable_fan_first_layers = 1
full_fan_speed_layer = 5
fan_below_layer_time = 0
slowdown_below_layer_time = 0
min_print_speed = 25
