<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quote Color Layout Fixture</title>
  <link rel="stylesheet" href="../static/css/design-tokens.css" />
  <link rel="stylesheet" href="../static/css/table-enhancements.css" />
  <style>
    body { padding: 24px; background: var(--color-bg); }
    .wrap { max-width: 1280px; margin: 0 auto; background: rgba(255,255,255,.86); border: 1px solid var(--color-border); border-radius: 20px; overflow: visible; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 10px; border-bottom: 1px solid var(--color-border); }
    thead { background: var(--color-disabled-bg); }
  </style>
</head>
<body>
  <div class="wrap">
    <table>
      <thead>
        <tr>
          <th>文件名</th><th>预览</th><th>配置</th><th>数量</th><th>重量</th><th>时间</th><th>报价</th><th>状态</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="batch-results-body">
        <tr data-row-file="debug-part.stl" class="table-row-success">
          <td><div>debug-part.stl</div><button type="button" class="mt-0.5 text-[10px] text-indigo-500 underline">详情</button></td>
          <td><button type="button" class="text-[12px] text-indigo-600 border border-indigo-200 rounded px-2 py-0.5">预览</button></td>
          <td>
            <div class="quote-config-grid min-w-[232px]">
              <div class="quote-config-row">
                <select data-field="_printer_model" aria-label="打印机" class="row-edit text-[10px]"><option>Bambu Lab A1 Mini</option></select>
                <select data-field="_slicer_preset_id" aria-label="预设" class="row-edit text-[10px]"><option>0.20-3-20%</option></select>
              </div>
              <div class="quote-config-row">
                <select data-field="_brand" aria-label="品牌" class="row-edit row-brand-select text-[11px]"><option>通用</option></select>
                <select data-field="material" aria-label="材料" class="row-edit text-[11px]"><option>PLA</option></select>
              </div>
              <div class="quote-config-row quote-config-row-color" data-field="color">
                <div class="color-dd-wrapper relative inline-block">
                  <button type="button" class="color-dd-trigger flex items-center gap-1 px-2 py-1 rounded text-[11px] tw-card tw-text min-w-[36px]">
                    <span class="color-dd-swatch w-3.5 h-3.5 rounded-sm border flex-shrink-0" style="background:#d1d5db;border-color:var(--color-border-input);"></span>
                    <svg class="w-3 h-3 tw-text-muted flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                  </button>
                  <div class="color-dd-list hidden absolute z-50 left-0 mt-1 tw-bg-surface border rounded-md shadow-lg overflow-y-auto min-w-[140px]" style="border-color:var(--color-border);max-height:360px;">
                    <button type="button" class="color-dd-item flex items-center gap-2 w-full px-3 py-2 text-sm border-b last:border-0 text-left" data-color-hex="#d1d5db"><span class="w-5 h-5 rounded-sm border flex-shrink-0" style="background:#d1d5db;border-color:var(--color-border-input);"></span><span class="flex-1 font-mono text-xs tw-text-secondary">#d1d5db</span></button>
                    <button type="button" class="color-dd-item flex items-center gap-2 w-full px-3 py-2 text-sm border-b last:border-0 text-left" data-color-hex="#111827"><span class="w-5 h-5 rounded-sm border flex-shrink-0" style="background:#111827;border-color:var(--color-border-input);"></span><span class="flex-1 font-mono text-xs tw-text-secondary">#111827</span></button>
                    <button type="button" class="color-dd-item flex items-center gap-2 w-full px-3 py-2 text-sm border-b last:border-0 text-left" data-color-hex="#ef4444"><span class="w-5 h-5 rounded-sm border flex-shrink-0" style="background:#ef4444;border-color:var(--color-border-input);"></span><span class="flex-1 font-mono text-xs tw-text-secondary">#ef4444</span></button>
                  </div>
                  <input type="hidden" class="row-color-value" value="#d1d5db" />
                </div>
              </div>
            </div>
          </td>
          <td><input data-field="quantity" type="number" min="1" value="1" class="row-edit w-14 text-[11px]" /></td>
          <td><div class="text-[10px] leading-tight">74.8g</div><div class="text-xs leading-tight font-medium">74.85g</div></td>
          <td><div class="text-[10px] leading-tight">03h25m48s</div><div class="text-xs leading-tight font-medium">03h25m48s</div></td>
          <td><div class="text-[10px] leading-tight">¥ 67.16</div><div class="text-xs leading-tight font-medium">¥ 67.16</div></td>
          <td data-role="status-cell" class="whitespace-nowrap font-medium text-[11px] text-green-600"><span class="inline-block w-2 h-2 rounded-full mr-1 align-middle bg-green-500"></span>成功</td>
          <td><button type="button" data-delete-file="debug-part.stl" class="text-xs text-red-500">删除</button></td>
        </tr>
      </tbody>
    </table>
  </div>
  <script type="module">
    import { initColorDropdownUI } from '../static/js/modules/app-shell.js';
    initColorDropdownUI({
      quoteOptions: {},
      currentResults: [{ filename: 'debug-part.stl', color: '#d1d5db' }],
      selectedFilesMap: new Map(),
      thumbnailMap: new Map(),
      dom: {},
      ensureThumbnailForFile: async () => {},
      recolorCurrentMesh: () => {},
      getCurrentPreviewFilename: () => '',
      refreshOptionsSummary: () => {},
    });
  </script>
</body>
</html>
