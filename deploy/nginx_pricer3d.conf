##
# pricer3d Nginx production template
# Usage:
# 1) Replace domain and certificate paths.
# 2) Keep uvicorn bound to 127.0.0.1:5000 (do NOT expose 5000 publicly).
# 3) sudo nginx -t && sudo systemctl reload nginx
##

# Global zone for API rate limiting.
# 10 requests/second per IP, short burst for normal page behavior.
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name www.pricer3d.top pricer3d.top;

    # Certbot challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all plaintext traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.pricer3d.top pricer3d.top;

    ssl_certificate /etc/letsencrypt/live/www.pricer3d.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.pricer3d.top/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Basic hardening headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API requests are rate-limited at the edge
    location /api/ {
        limit_req zone=api_per_ip burst=20 nodelay;

        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # App homepage and static files
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
