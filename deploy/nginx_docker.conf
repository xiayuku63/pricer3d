limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;

# HTTP 80 - redirect to HTTPS (except certbot ACME challenge)
server {
    listen 80;
    listen [::]:80;
    server_name www.pricer3d.top pricer3d.top 47.106.102.208;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 443
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.pricer3d.top pricer3d.top;

    # For direct IP access via HTTPS, add: 47.106.102.208
    # (requires a self-signed or IP-based cert, omitted here)

    # --- SSL Certificate (managed by certbot) ---
    ssl_certificate     /etc/letsencrypt/live/pricer3d.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pricer3d.top/privkey.pem;

    # --- SSL Optimization ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # Session tickets
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/pricer3d.top/chain.pem;
    resolver 223.5.5.5 223.6.6.6 valid=300s;
    resolver_timeout 5s;

    # HSTS (uncomment after confirming HTTPS works)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 120m;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        limit_req zone=api_per_ip burst=20 nodelay;
        proxy_pass http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
