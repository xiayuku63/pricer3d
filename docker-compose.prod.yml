services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: pricer3d-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - pricer3d_data:/app/data
    env_file:
      - .env.prod
    environment:
      - APP_ENV=production
      - PRUSA_EXECUTABLE=
      - UPLOADS_DIR=/app/data/uploads
      - OUTPUTS_DIR=/app/data/outputs
      - USER_DATA_DIR=/app/data/user
      - DB_PATH=/app/data/app.db
      - BACKUP_DIR=/app/data/backups
      - LOG_DIR=/app/data/logs

  nginx:
    image: nginx:alpine
    container_name: pricer3d-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx_docker.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
  certbot:
    image: certbot/certbot:latest
    container_name: pricer3d-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    depends_on:
      - nginx


volumes:
  pricer3d_data:
  certbot_www:
  certbot_certs:
