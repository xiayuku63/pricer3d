    <div id="color-editor-modal" class="hidden fixed inset-0 z-50">
        <div class="absolute inset-0" style="background-color: var(--color-overlay);"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="tw-card shadow-xl w-full max-w-sm overflow-hidden" style="border-radius: var(--radius-xl);">
                <div class="flex items-center justify-between px-4 py-3" style="border-bottom: 1px solid var(--color-border);">
                    <h4 id="color-editor-title" class="text-sm font-semibold tw-text-strong">编辑颜色</h4>
                    <button id="color-editor-close" type="button" class="tw-text-muted hover:tw-text text-lg leading-none p-2 min-w-[44px] min-h-[44px] flex items-center justify-center">&times;</button>
                </div>
                <div class="p-4 space-y-3">
                    <p id="color-editor-toast" class="hidden text-xs" style="color: var(--color-warning);"></p>
                    <div id="color-editor-list" class="space-y-1.5 max-h-40 overflow-y-auto"></div>
                    <div class="pt-3" style="border-top: 1px solid var(--color-border);">
                        <label class="text-xs tw-text-secondary">新增颜色</label>
                        <div class="flex flex-col items-center gap-2 mt-2 color-editor-wheel">
                            <!-- Color wheel canvas -->
                            <canvas id="color-editor-canvas" width="180" height="180" class="rounded-full cursor-crosshair" style="display:block;"></canvas>
                            <!-- Preview + hex + name + add -->
                            <div class="flex items-center gap-2 w-full">
                                <span id="color-editor-swatch" class="w-8 h-8 rounded-lg flex-shrink-0 shadow-sm" style="background:#6366f1; border: 1px solid var(--color-border-strong);"></span>
                                <span id="color-editor-hex" class="text-xs font-mono tw-text-secondary font-semibold w-20 select-all">#6366f1</span>
                                <input id="color-editor-name" type="text" placeholder="颜色名称（可选）" class="tw-input flex-1 text-xs px-2 py-1.5">
                                <button id="color-editor-add" type="button" class="tw-btn-primary px-3 py-1.5 text-xs rounded-md">添加</button>
                            </div>
                            <!-- Monochrome swatches row -->
                            <div id="color-editor-mono" class="flex gap-1.5 justify-center flex-wrap w-full"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
