            <!-- 报价历史弹窗 -->
            <div id="quote-history-modal" class="hidden fixed inset-0 z-50">
                <div id="quote-history-backdrop" class="absolute inset-0" style="background-color: var(--color-overlay);"></div>
                <div class="relative z-10 h-full w-full flex items-center justify-center p-4">
                    <div class="w-full max-w-7xl tw-card shadow-xl overflow-hidden flex flex-col max-h-[90vh]" style="border-radius: var(--radius-lg);">
                        <div class="px-4 py-3 flex items-center justify-between" style="border-bottom: 1px solid var(--color-border);">

                        </div>
                        <div class="flex-1 overflow-auto p-4">

                                <label class="relative flex-1 min-w-[220px]"><span class="sr-only">搜索文件名</span><input id="history-search-input" type="search" class="tw-input w-full text-xs px-3 py-2" placeholder="搜索文件名或材料" /></label>
                                <select id="history-status-filter" class="tw-input text-xs px-3 py-2"><option value="all">全部状态</option><option value="success">报价成功</option><option value="failed">报价失败</option></select>
                                <span id="history-summary" class="text-[11px] tw-text-muted"></span>
                            </div>
                            <div class="overflow-x-auto rounded-lg" style="border: 1px solid var(--color-border);">
                                <table class="min-w-full text-xs text-left border-collapse">
                                    <thead class="sticky top-0" style="background-color: var(--color-disabled-bg); color: var(--color-text-secondary);">
                                        <tr>
                                            <th class="px-3 py-2" data-i18n="history.time">时间</th>
                                            <th class="px-3 py-2" data-i18n="history.files">文件名</th>
                                            <th class="px-3 py-2" data-i18n="quote.printerModel">打印机</th>
                                            <th class="px-3 py-2" data-i18n="quote.nozzleDiameter">喷嘴</th>
                                            <th class="px-3 py-2" data-i18n="history.layerHeight">层高(mm)</th>
                                            <th class="px-3 py-2" data-i18n="history.wallCount">墙层数</th>
                                            <th class="px-3 py-2" data-i18n="history.infill">填充</th>
                                            <th class="px-3 py-2" data-i18n="quote.material">材料</th>
                                            <th class="px-3 py-2" data-i18n="quote.quantity">数量</th>
                                            <th class="px-3 py-2" data-i18n="history.volume">体积(cm³)</th>
                                            <th class="px-3 py-2" data-i18n="history.weight">重量(g)</th>
                                            <th class="px-3 py-2" data-i18n="history.duration">时间</th>
                                            <th class="px-3 py-2" data-i18n="history.cost">费用(¥)</th>
                                            <th class="px-3 py-2" data-i18n="history.status">状态</th>
                                            <th class="px-3 py-2" data-i18n="quote.actions">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="history-tbody">
                                        <tr><td class="px-3 py-12 tw-text-muted text-center" colspan="16">
                                            <div class="text-6xl mb-3">📭</div>
                                            <p class="text-sm" data-i18n="history.noRecords">暂无报价历史记录</p>
                                            <p class="text-xs mt-1 tw-text-muted" data-i18n="history.noRecordsSubtext">上传模型完成报价后，记录将显示在这里</p>
                                        </td></tr>
                                    </tbody>
                                </table>
                            </div>
                            <!-- Pagination -->
                            <div id="history-pagination" class="mt-3 px-2"></div>
                        </div>
                    </div>
                </div>
            </div>
