            <!-- 报价参数弹窗 -->
            <div id="options-modal" class="hidden fixed inset-0 z-50">
                <div id="options-backdrop" class="absolute inset-0 bg-black/50"></div>
                <div class="relative z-10 h-full w-full flex items-end sm:items-center justify-center p-0 sm:p-4">
                    <div id="options-modal-panel" class="w-full sm:max-w-md bg-white rounded-t-2xl sm:rounded-lg sm:shadow-xl overflow-hidden max-h-[90dvh] sm:max-h-[90vh] flex flex-col transform translate-y-full sm:translate-y-0 transition-transform duration-300 ease-out">
                        <div class="px-4 py-3 border-b border-gray-200 flex items-center justify-between flex-shrink-0">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-1 bg-gray-300 rounded-full sm:hidden mx-auto mb-1 absolute left-1/2 -translate-x-1/2 top-2"></div>
                                <h4 class="text-base sm:text-sm font-semibold text-gray-800">修改报价参数</h4>
                            </div>
                            <button id="options-close-btn" type="button" class="text-gray-500 hover:text-gray-700 min-h-[44px] min-w-[44px] flex items-center justify-center" enterkeyhint="done">关闭</button>
                        </div>
                        <div class="p-4 space-y-5 overflow-y-auto flex-1 overscroll-contain">
                            <!-- 材料与颜色收藏快速选择 -->
                            <div id="pref-favorites-panel" class="form-section"></div>
                            <!-- 材料选择 -->
                            <div class="form-section">
                                <label for="opt-material" class="block text-sm font-semibold text-gray-700 mb-1.5">材料</label>
                                <select id="opt-material" class="block w-full py-3 px-3 border border-gray-300 bg-white rounded-lg text-base sm:text-sm min-h-[48px] focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" enterkeyhint="next">
                                    <!-- 动态生成 -->
                                </select>
                                <span id="opt-material-hint" class="form-field-hint hidden">请选择材料</span>
                            </div>
                            <!-- 颜色收藏快速选择 -->
                            <div id="pref-color-favorites-panel" class="form-section"></div>
                            <!-- 颜色选择 -->
                            <div class="form-section">
                                <label class="block text-sm font-semibold text-gray-700 mb-1.5">颜色</label>
                                <div id="opt-color" class="mt-1 flex flex-wrap gap-2.5"></div>
                                <span id="opt-color-hint" class="form-field-hint hidden">请选择颜色</span>
                            </div>
                            <!-- 数量 -->
                            <div class="form-section">
                                <label for="opt-quantity" class="block text-sm font-semibold text-gray-700 mb-1.5">数量</label>
                                <div class="flex items-center gap-2">
                                    <button id="opt-qty-dec" type="button" class="qty-stepper-btn flex-shrink-0 w-12 h-12 rounded-lg border border-gray-300 bg-gray-50 text-xl font-medium text-gray-600 hover:bg-gray-100 active:bg-gray-200 flex items-center justify-center transition-colors" aria-label="减少数量">−</button>
                                    <input id="opt-quantity" type="number" inputmode="numeric" min="1" value="1" enterkeyhint="done" class="block flex-1 py-3 px-3 border border-gray-300 rounded-lg text-center text-base font-medium min-h-[48px] focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
                                    <button id="opt-qty-inc" type="button" class="qty-stepper-btn flex-shrink-0 w-12 h-12 rounded-lg border border-gray-300 bg-gray-50 text-xl font-medium text-gray-600 hover:bg-gray-100 active:bg-gray-200 flex items-center justify-center transition-colors" aria-label="增加数量">+</button>
                                </div>
                                <span id="opt-quantity-hint" class="form-field-hint hidden">最小数量为 1</span>
                                <span id="opt-quantity-error" class="form-field-error hidden">数量不能小于 1</span>
                            </div>
                            <!-- 保存按钮 -->
                            <div class="pt-2 flex-shrink-0 pb-[env(safe-area-inset-bottom)]">
                                <button id="options-save-btn" type="button" class="w-full py-3.5 px-4 rounded-xl bg-indigo-600 text-white text-base font-medium hover:bg-indigo-700 min-h-[52px] active:bg-indigo-800 active:scale-[0.98] transition-all shadow-sm">保存参数</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
