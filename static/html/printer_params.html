<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打印机参数管理 - Pricer3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #16213e; }
        ::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #1a5276; }

        /* Layout */
        .app-container { display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 280px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #0f3460; }
        .sidebar-header h2 { font-size: 18px; font-weight: 600; color: #4fc3f7; }
        .sidebar-header p { font-size: 12px; color: #7f8c8d; margin-top: 4px; }
        
        .printer-tree { flex: 1; overflow-y: auto; padding: 12px; }
        .printer-group { margin-bottom: 8px; }
        .printer-group-header { 
            display: flex; align-items: center; padding: 10px 12px; 
            background: #1a1a2e; border-radius: 8px; cursor: pointer;
            transition: all 0.2s; user-select: none;
        }
        .printer-group-header:hover { background: #0f3460; }
        .printer-group-header.active { background: #0f3460; border-left: 3px solid #4fc3f7; }
        .printer-group-header .arrow { 
            width: 16px; height: 16px; margin-right: 8px; 
            transition: transform 0.2s; font-size: 10px; color: #7f8c8d;
            display: flex; align-items: center; justify-content: center;
        }
        .printer-group-header.expanded .arrow { transform: rotate(90deg); }
        .printer-group-header .printer-icon { 
            width: 20px; height: 20px; margin-right: 10px; 
            background: #4fc3f7; border-radius: 4px; display: flex; 
            align-items: center; justify-content: center; font-size: 10px; color: #1a1a2e;
        }
        .printer-group-header .printer-name { flex: 1; font-size: 14px; font-weight: 500; }
        .printer-group-header .nozzle-count { 
            font-size: 11px; color: #7f8c8d; background: #1a1a2e; 
            padding: 2px 8px; border-radius: 10px;
        }
        
        .nozzle-list { display: none; padding-left: 36px; }
        .nozzle-list.show { display: block; }
        .nozzle-item { 
            display: flex; align-items: center; padding: 8px 12px; 
            border-radius: 6px; cursor: pointer; transition: all 0.2s; margin: 2px 0;
        }
        .nozzle-item:hover { background: #1a1a2e; }
        .nozzle-item.active { background: #0f3460; }
        .nozzle-item .nozzle-dot { 
            width: 8px; height: 8px; background: #4fc3f7; 
            border-radius: 50%; margin-right: 10px;
        }
        .nozzle-item .nozzle-label { font-size: 13px; }
        .nozzle-item .nozzle-size { color: #4fc3f7; font-weight: 500; }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .main-header { 
            padding: 20px 24px; background: #16213e; border-bottom: 1px solid #0f3460;
            display: flex; align-items: center; justify-content: space-between;
        }
        .main-header h1 { font-size: 20px; font-weight: 600; }
        .main-header .breadcrumb { font-size: 13px; color: #7f8c8d; }
        .main-header .breadcrumb span { color: #4fc3f7; }
        
        .content-area { flex: 1; overflow-y: auto; padding: 24px; }

        /* Cards */
        .card { 
            background: #16213e; border-radius: 12px; border: 1px solid #0f3460;
            margin-bottom: 20px; overflow: hidden;
        }
        .card-header { 
            padding: 16px 20px; border-bottom: 1px solid #0f3460;
            display: flex; align-items: center; justify-content: space-between;
        }
        .card-header h3 { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .card-header .card-icon { 
            width: 24px; height: 24px; background: #4fc3f7; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; font-size: 12px; color: #1a1a2e;
        }
        .card-body { padding: 20px; }

        /* Form Elements */
        .form-group { margin-bottom: 16px; }
        .form-group:last-child { margin-bottom: 0; }
        .form-label { 
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 8px; font-size: 13px; color: #bdc3c7;
        }
        .form-label .label-text { font-weight: 500; }
        .form-label .label-value { 
            background: #1a1a2e; padding: 4px 12px; border-radius: 6px;
            font-family: 'Courier New', monospace; font-size: 13px; color: #4fc3f7;
        }

        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-input { 
            flex: 1; -webkit-appearance: none; height: 6px; 
            background: #0f3460; border-radius: 3px; outline: none;
        }
        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px;
            background: #4fc3f7; border-radius: 50%; cursor: pointer;
            box-shadow: 0 2px 6px rgba(79, 195, 247, 0.4);
        }
        .number-input { 
            width: 80px; padding: 8px 12px; background: #1a1a2e; 
            border: 1px solid #0f3460; border-radius: 6px; color: #e0e0e0;
            font-size: 13px; text-align: center; font-family: 'Courier New', monospace;
        }
        .number-input:focus { outline: none; border-color: #4fc3f7; }

        /* Toggle Switch */
        .toggle-row { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 0; border-top: 1px solid #0f3460;
        }
        .toggle-row:first-child { border-top: none; }
        .toggle-info { flex: 1; }
        .toggle-label { font-size: 14px; font-weight: 500; }
        .toggle-desc { font-size: 12px; color: #7f8c8d; margin-top: 2px; }
        
        .toggle-switch { 
            position: relative; width: 48px; height: 24px; cursor: pointer;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: #0f3460; border-radius: 12px; transition: 0.3s;
        }
        .toggle-slider::before { 
            content: ''; position: absolute; width: 18px; height: 18px;
            left: 3px; bottom: 3px; background: #7f8c8d; border-radius: 50%;
            transition: 0.3s;
        }
        .toggle-switch input:checked + .toggle-slider { background: #4fc3f7; }
        .toggle-switch input:checked + .toggle-slider::before { 
            transform: translateX(24px); background: #1a1a2e;
        }

        /* Info Grid */
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .info-item { 
            background: #1a1a2e; padding: 14px; border-radius: 8px;
        }
        .info-item .info-label { font-size: 12px; color: #7f8c8d; margin-bottom: 4px; }
        .info-item .info-value { font-size: 16px; font-weight: 600; color: #4fc3f7; }

        /* Empty State */
        .empty-state { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100%; color: #7f8c8d;
        }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state .empty-text { font-size: 16px; }
        .empty-state .empty-hint { font-size: 13px; margin-top: 8px; }

        /* Save Button */
        .btn-save { 
            background: #4fc3f7; color: #1a1a2e; border: none; padding: 12px 32px;
            border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-save:hover { background: #81d4fa; transform: translateY(-1px); }
        .btn-save:disabled { background: #0f3460; color: #7f8c8d; cursor: not-allowed; transform: none; }

        /* Toast */
        .toast { 
            position: fixed; top: 20px; right: 20px; padding: 14px 24px;
            border-radius: 8px; font-size: 14px; z-index: 1000;
            transform: translateX(120%); transition: transform 0.3s;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #27ae60; color: white; }
        .toast.error { background: #e74c3c; color: white; }
        .toast.info { background: #3498db; color: white; }

        /* Loading */
        .loading-spinner { 
            width: 24px; height: 24px; border: 3px solid #0f3460;
            border-top-color: #4fc3f7; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🖨️ 打印机管理</h2>
                <p>选择打印机和喷嘴配置</p>
            </div>
            <div class="printer-tree" id="printerTree">
                <!-- 动态生成 -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div>
                    <h1>打印机参数</h1>
                    <div class="breadcrumb" id="breadcrumb">请选择打印机和喷嘴</div>
                </div>
                <button class="btn-save" id="btnSave" disabled onclick="saveParams()">
                    💾 保存修改
                </button>
            </header>
            
            <div class="content-area" id="contentArea">
                <div class="empty-state">
                    <div class="empty-icon">🖨️</div>
                    <div class="empty-text">请选择打印机和喷嘴</div>
                    <div class="empty-hint">从左侧列表选择要配置的打印机</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // 状态
        let printers = {};
        let currentPrinter = null;
        let currentNozzle = null;
        let currentParams = null;
        let hasChanges = false;

        // 初始化
        async function init() {
            await loadPrinters();
            renderTree();
        }

        // 加载所有打印机参数
        async function loadPrinters() {
            try {
                // 先获取所有打印机列表（假设有一个列表端点，或者从参数中提取）
                // 临时方案：硬编码常见打印机，后续可改为从API获取
                const printerIds = ['bambu_a1', 'bambu_a1_mini', 'bambu_p1s', 'bambu_x1c', 'bambu_p1p'];
                
                for (const pid of printerIds) {
                    try {
                        const resp = await fetch(`/api/printer-params/${pid}`);
                        if (resp.ok) {
                            const params = await resp.json();
                            if (params.length > 0) {
                                printers[pid] = params;
                            }
                        }
                    } catch (e) {
                        // 忽略单个打印机的错误
                    }
                }
            } catch (e) {
                showToast('加载打印机列表失败', 'error');
            }
        }

        // 渲染打印机树
        function renderTree() {
            const tree = document.getElementById('printerTree');
            tree.innerHTML = '';

            if (Object.keys(printers).length === 0) {
                tree.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px; color: #7f8c8d;">
                        <div style="font-size: 32px; margin-bottom: 12px;">📭</div>
                        <div>暂无打印机数据</div>
                    </div>
                `;
                return;
            }

            for (const [printerId, nozzles] of Object.entries(printers)) {
                const group = document.createElement('div');
                group.className = 'printer-group';
                
                const displayName = formatPrinterName(printerId);
                const isExpanded = currentPrinter === printerId;

                group.innerHTML = `
                    <div class="printer-group-header ${isExpanded ? 'expanded active' : ''}" 
                         onclick="togglePrinter('${printerId}')">
                        <span class="arrow">▶</span>
                        <span class="printer-icon">🖨</span>
                        <span class="printer-name">${displayName}</span>
                        <span class="nozzle-count">${nozzles.length}个喷嘴</span>
                    </div>
                    <div class="nozzle-list ${isExpanded ? 'show' : ''}">
                        ${nozzles.map(n => `
                            <div class="nozzle-item ${currentPrinter === printerId && currentNozzle === n.nozzle ? 'active' : ''}"
                                 onclick="selectNozzle('${printerId}', ${n.nozzle})">
                                <span class="nozzle-dot"></span>
                                <span class="nozzle-label">
                                    <span class="nozzle-size">${n.nozzle}mm</span> 喷嘴
                                </span>
                            </div>
                        `).join('')}
                    </div>
                `;
                tree.appendChild(group);
            }
        }

        // 格式化打印机名称
        function formatPrinterName(printerId) {
            const names = {
                'bambu_a1': 'Bambu Lab A1',
                'bambu_a1_mini': 'Bambu Lab A1 Mini',
                'bambu_p1s': 'Bambu Lab P1S',
                'bambu_p1p': 'Bambu Lab P1P',
                'bambu_x1c': 'Bambu Lab X1C',
                'bambu_x1e': 'Bambu Lab X1E',
            };
            return names[printerId] || printerId.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        // 切换打印机展开/折叠
        function togglePrinter(printerId) {
            if (currentPrinter === printerId) {
                // 收起
                currentPrinter = null;
                currentNozzle = null;
                currentParams = null;
                renderEmptyState();
            } else {
                currentPrinter = printerId;
                // 默认选择第一个喷嘴
                const nozzles = printers[printerId];
                if (nozzles && nozzles.length > 0) {
                    selectNozzle(printerId, nozzles[0].nozzle);
                }
            }
            renderTree();
        }

        // 选择喷嘴
        async function selectNozzle(printerId, nozzle) {
            currentPrinter = printerId;
            currentNozzle = nozzle;
            hasChanges = false;
            
            renderTree();
            updateBreadcrumb();
            
            // 加载参数
            await loadNozzleParams(printerId, nozzle);
        }

        // 加载喷嘴参数
        async function loadNozzleParams(printerId, nozzle) {
            const content = document.getElementById('contentArea');
            content.innerHTML = `
                <div style="display: flex; justify-content: center; align-items: center; height: 200px;">
                    <div class="loading-spinner"></div>
                </div>
            `;

            try {
                const resp = await fetch(`/api/printer-params/${printerId}/${nozzle}`);
                if (!resp.ok) throw new Error('加载失败');
                
                currentParams = await resp.json();
                renderParams();
            } catch (e) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <div class="empty-text">加载参数失败</div>
                        <div class="empty-hint">${e.message}</div>
                    </div>
                `;
            }
        }

        // 渲染参数面板
        function renderParams() {
            const content = document.getElementById('contentArea');
            const p = currentParams;
            
            content.innerHTML = `
                <!-- 基础信息卡片 -->
                <div class="card">
                    <div class="card-header">
                        <h3>
                            <span class="card-icon">ℹ</span>
                            基础信息
                        </h3>
                    </div>
                    <div class="card-body">
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="info-label">机型</div>
                                <div class="info-value">${formatPrinterName(p.printer_id)}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">喷嘴直径</div>
                                <div class="info-value">${p.nozzle}mm</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">参数ID</div>
                                <div class="info-value">#${p.id}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">速度限制状态</div>
                                <div class="info-value">${p.speed_enabled ? '✅ 已启用' : '❌ 未启用'}</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 运动参数卡片 -->
                <div class="card">
                    <div class="card-header">
                        <h3>
                            <span class="card-icon">⚡</span>
                            运动参数
                        </h3>
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <div class="form-label">
                                <span class="label-text">最大速度 (mm/s)</span>
                                <span class="label-value" id="speedValue">${p.max_speed}</span>
                            </div>
                            <div class="slider-container">
                                <input type="range" class="slider-input" id="maxSpeed" 
                                       min="50" max="1000" step="10" value="${p.max_speed}"
                                       oninput="updateSlider('maxSpeed', 'speedValue')">
                                <input type="number" class="number-input" id="maxSpeedNum"
                                       min="50" max="1000" value="${p.max_speed}"
                                       oninput="updateNumber('maxSpeed', 'maxSpeedNum', 'speedValue')">
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="form-label">
                                <span class="label-text">最大加速度 (mm/s²)</span>
                                <span class="label-value" id="accelValue">${p.max_acceleration}</span>
                            </div>
                            <div class="slider-container">
                                <input type="range" class="slider-input" id="maxAccel" 
                                       min="500" max="50000" step="500" value="${p.max_acceleration}"
                                       oninput="updateSlider('maxAccel', 'accelValue')">
                                <input type="number" class="number-input" id="maxAccelNum"
                                       min="500" max="50000" value="${p.max_acceleration}"
                                       oninput="updateNumber('maxAccel', 'maxAccelNum', 'accelValue')">
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="form-label">
                                <span class="label-text">抖动限制 (Jerk)</span>
                                <span class="label-value" id="jerkValue">${p.jerk_limit}</span>
                            </div>
                            <div class="slider-container">
                                <input type="range" class="slider-input" id="jerkLimit" 
                                       min="0" max="0.5" step="0.01" value="${p.jerk_limit}"
                                       oninput="updateSlider('jerkLimit', 'jerkValue')">
                                <input type="number" class="number-input" id="jerkLimitNum"
                                       min="0" max="0.5" step="0.01" value="${p.jerk_limit}"
                                       oninput="updateNumber('jerkLimit', 'jerkLimitNum', 'jerkValue')">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 功能开关卡片 -->
                <div class="card">
                    <div class="card-header">
                        <h3>
                            <span class="card-icon">⚙</span>
                            功能设置
                        </h3>
                    </div>
                    <div class="card-body">
                        <div class="toggle-row">
                            <div class="toggle-info">
                                <div class="toggle-label">启用速度限制</div>
                                <div class="toggle-desc">启用后将根据材料和打印机能力限制最大打印速度</div>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="speedEnabled" 
                                       ${p.speed_enabled ? 'checked' : ''}
                                       onchange="markChanged()">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('btnSave').disabled = false;
        }

        // 更新滑块
        function updateSlider(sliderId, valueId) {
            const slider = document.getElementById(sliderId);
            const numInput = document.getElementById(sliderId + 'Num');
            const valueDisplay = document.getElementById(valueId);
            
            numInput.value = slider.value;
            valueDisplay.textContent = slider.value;
            markChanged();
        }

        // 更新数字输入
        function updateNumber(sliderId, numId, valueId) {
            const slider = document.getElementById(sliderId);
            const numInput = document.getElementById(numId);
            const valueDisplay = document.getElementById(valueId);
            
            let val = parseFloat(numInput.value);
            if (isNaN(val)) return;
            
            // 限制范围
            const min = parseFloat(numInput.min);
            const max = parseFloat(numInput.max);
            val = Math.max(min, Math.min(max, val));
            
            slider.value = val;
            valueDisplay.textContent = val;
            markChanged();
        }

        // 标记已修改
        function markChanged() {
            hasChanges = true;
        }

        // 保存参数
        async function saveParams() {
            if (!currentParams || !hasChanges) return;

            const data = {
                max_speed: parseInt(document.getElementById('maxSpeed').value),
                max_acceleration: parseInt(document.getElementById('maxAccel').value),
                jerk_limit: parseFloat(document.getElementById('jerkLimit').value),
                speed_enabled: document.getElementById('speedEnabled').checked
            };

            try {
                const resp = await fetch(`/api/printer-params/${currentPrinter}/${currentNozzle}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || '保存失败');
                }

                currentParams = await resp.json();
                hasChanges = false;
                showToast('参数保存成功', 'success');
                
                // 更新本地数据
                if (printers[currentPrinter]) {
                    const idx = printers[currentPrinter].findIndex(p => p.nozzle === currentNozzle);
                    if (idx >= 0) {
                        printers[currentPrinter][idx] = currentParams;
                    }
                }
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        // 更新面包屑
        function updateBreadcrumb() {
            const breadcrumb = document.getElementById('breadcrumb');
            if (currentPrinter && currentNozzle) {
                breadcrumb.innerHTML = `
                    <span>${formatPrinterName(currentPrinter)}</span> 
                    → <span>${currentNozzle}mm 喷嘴</span>
                `;
            } else {
                breadcrumb.textContent = '请选择打印机和喷嘴';
            }
        }

        // 渲染空状态
        function renderEmptyState() {
            const content = document.getElementById('contentArea');
            content.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🖨️</div>
                    <div class="empty-text">请选择打印机和喷嘴</div>
                    <div class="empty-hint">从左侧列表选择要配置的打印机</div>
                </div>
            `;
            document.getElementById('btnSave').disabled = true;
            updateBreadcrumb();
        }

        // 显示提示
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 启动
        init();
    </script>
</body>
</html>
